services:
  postgres:
    image: postgres:16
    container_name: geo-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - geo_os_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geo_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  geo_os_postgres_data:
